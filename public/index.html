<!DOCTYPE html><html>
<body style="font-family:sans-serif; padding:20px;">
<h3>Cloud Upload</h3>
<input type="file" id="f"><button onclick="up()">Upload</button>
<p id="s"></p>
<script>
async function up() {
const fd = new FormData(); fd.append('file', document.getElementById('f').files[0]);
document.getElementById('s').innerText = "Working...";
const r = await fetch('/upload', { method: 'POST', body: fd });
document.getElementById('s').innerText = await r.text();
}
async function download(url, fileName) {
const res = await fetch(url);
const data = new Uint8Array(await res.arrayBuffer());
const iv = data.slice(0, 16);
const encrypted = data.slice(16);
const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(prompt("Enter Key")), "PBKDF2", false, ["deriveKey"]);
const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: new TextEncoder().encode('salt'), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: "AES-CTR", length: 256 }, false, ["decrypt"]);
const decrypted = await crypto.subtle.decrypt({ name: "AES-CTR", counter: iv, length: 64 }, key, encrypted);
const blob = new Blob([decrypted]);
const link = document.createElement('a');
link.href = URL.createObjectURL(blob);
link.download = fileName.replace('.enc', '');
link.click();
}
</script></body></html>
